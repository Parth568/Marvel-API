<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marvel API - Register</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      .auth-container {
        background-color: #171821;
        width: 90%;
        max-width: 420px;
        margin: 0 auto;
        padding: 3em 2em;
        position: absolute;
        transform: translateX(-50%);
        left: 50%;
        top: 4em;
        border-radius: 1em;
      }
      .auth-title {
        color: #ffffff;
        font-size: 1.5em;
        font-weight: 600;
        text-align: center;
        margin-bottom: 1.5em;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .auth-title span {
        color: #e01a38;
      }
      .auth-field {
        display: flex;
        flex-direction: column;
        gap: 0.4em;
        margin-bottom: 1.2em;
      }
      .auth-field label {
        color: #a0a0a6;
        font-size: 0.85em;
        font-weight: 300;
      }
      .auth-field input {
        padding: 0.9em 0.75em;
        background-color: #3a3939;
        color: #ffffff;
        border: none;
        border-radius: 0.5em;
        outline: none;
        width: 100%;
        font-size: 0.95em;
      }
      .auth-btn {
        width: 100%;
        padding: 0.9em;
        background-color: #e01a38;
        color: #ffffff;
        border: none;
        border-radius: 0.5em;
        cursor: pointer;
        font-family: "Poppins", sans-serif;
        font-weight: 600;
        font-size: 1em;
        margin-top: 0.5em;
      }
      .auth-btn:hover {
        opacity: 0.88;
      }
      .auth-links {
        margin-top: 1.4em;
        text-align: center;
        font-size: 0.85em;
        color: #a0a0a6;
        font-weight: 300;
      }
      .auth-links a {
        color: #e01a38;
        text-decoration: none;
        font-weight: 600;
      }
      .auth-links a:hover {
        text-decoration: underline;
      }
      .auth-error {
        color: #e01a38;
        font-size: 0.82em;
        text-align: center;
        margin-top: 0.8em;
        min-height: 1.2em;
      }
      .auth-success {
        color: #4caf50;
        font-size: 0.82em;
        text-align: center;
        margin-top: 0.8em;
        min-height: 1.2em;
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-title">Marvel <span>API</span></div>

      <div class="auth-field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>

      <div class="auth-field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min 6 characters" />
      </div>

      <div class="auth-field">
        <label for="confirm-password">Confirm Password</label>
        <input
          type="password"
          id="confirm-password"
          placeholder="Re-enter password"
        />
      </div>

      <button class="auth-btn" id="register-btn">Create Account</button>

      <div class="auth-error" id="error-msg"></div>
      <div class="auth-success" id="success-msg"></div>

      <div class="auth-links">
        Already have an account? &nbsp;&middot;&nbsp;
        <a href="login.html">Log In</a>
      </div>
    </div>

    <script type="module" src="./src/register.js"></script>
  </body>
</html>
